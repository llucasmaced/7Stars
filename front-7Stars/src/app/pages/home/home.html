<div>
    <section class="text-gray-600 body-font">
        <div class="container px-5 py-24 mx-auto justify-center">
            <div class="flex flex-col text-center w-full mb-20 ">
                <div class="flex justify-center">
                    <h1 class="text-5xl font-medium title-font mb-4 text-gray-900 tracking-widest">7 </h1>
                    <svg class="w-12 h-12 text-fg-disabled text-yellow-500" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path
                            d="M13.849 4.22c-.684-1.626-3.014-1.626-3.698 0L8.397 8.387l-4.552.361c-1.775.14-2.495 2.331-1.142 3.477l3.468 2.937-1.06 4.392c-.413 1.713 1.472 3.067 2.992 2.149L12 19.35l3.897 2.354c1.52.918 3.405-.436 2.992-2.15l-1.06-4.39 3.468-2.938c1.353-1.146.633-3.336-1.142-3.477l-4.552-.36-1.754-4.17Z" />
                    </svg>
                    <h1 class="text-5xl font-medium title-font mb-4 text-gray-900 tracking-widest">Stars</h1>
                </div>
                <p class="lg:w-full mx-auto leading-relaxed text-base">
                    Avaliação de empresas, produtos e serviços. A sua opinião é muito importante para nós, por isso, não
                    deixe de avaliar!
                </p>
            </div>
            <div class="m-10">
                <label for="Search">
                    <span class="sr-only"> Search </span>

                    <div class="mx-auto max-w-5xl">
                        <div
                            class="flex overflow-hidden border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black">

                            <input #campoBusca type="search" placeholder="Buscar empresa, produto ou pessoa..."
                                class="w-full px-4 py-3 text-base text-black outline-none" (input)="buscar(campoBusca.value)" />

                            <button type="button" (click)="buscar(campoBusca.value)"
                                class="border-l-2 border-black bg-black px-6 py-3 font-semibold text-white transition hover:bg-yellow-500 hover:text-black">

                                Buscar
                            </button>
                        </div>
                    </div>
                </label>
            </div>
            <div>
                <section class="text-gray-600 body-font">
                    <div class="container px-5 py-24 mx-auto ">
                        <div class="flex flex-wrap -m-4">
                            <div *ngFor="let feedback of feedbacks()" class="p-4 lg:w-1/3">
                                <div
                                    class="h-full bg-black text-white bg-opacity-75 px-8 pt-16 pb-24 rounded-lg overflow-hidden text-center relative">
                                    <h2 class="tracking-widest text-xs title-font font-medium text-gray-400 mb-1">
                                        {{ feedback.categoria }}
                                    </h2>
                                    <h1 class="title-font sm:text-2xl text-xl font-medium text-white mb-3">
                                        {{ feedback.nomeAvaliado }}
                                    </h1>
                                    <p class="leading-relaxed mb-3">
                                        {{ feedback.comentario }}
                                    </p>
                                    <a class="text-yellow-500 inline-flex items-center">
                                        <svg *ngFor="let star of getStars(feedback.nota)"
                                            class="w-7 h-7 text-fg-disabled" aria-hidden="true"
                                            xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            fill="currentColor" viewBox="0 0 24 24">
                                            <path
                                                d="M13.849 4.22c-.684-1.626-3.014-1.626-3.698 0L8.397 8.387l-4.552.361c-1.775.14-2.495 2.331-1.142 3.477l3.468 2.937-1.06 4.392c-.413 1.713 1.472 3.067 2.992 2.149L12 19.35l3.897 2.354c1.52.918 3.405-.436 2.992-2.15l-1.06-4.39 3.468-2.938c1.353-1.146.633-3.336-1.142-3.477l-4.552-.36-1.754-4.17Z" />
                                        </svg>
                                    </a>
                                    <div
                                        class="text-center mt-2 leading-none flex justify-center absolute bottom-0 left-0 w-full py-4">
                                        <span
                                            class="text-gray-400 mr-3 inline-flex items-center leading-none text-sm pr-3 py-1 border-r-2 border-gray-200">
                                            <svg class="w-6 h-6 p-1 text-white dark:text-white" aria-hidden="true"
                                                xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                                                viewBox="0 0 18 20">
                                                <path
                                                    d="M16 0H4a2 2 0 0 0-2 2v1H1a1 1 0 0 0 0 2h1v2H1a1 1 0 0 0 0 2h1v2H1a1 1 0 0 0 0 2h1v2H1a1 1 0 0 0 0 2h1v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2Zm-5.5 4.5a3 3 0 1 1 0 6 3 3 0 0 1 0-6ZM13.929 17H7.071a.5.5 0 0 1-.5-.5 3.935 3.935 0 1 1 7.858 0 .5.5 0 0 1-.5.5Z" />
                                            </svg>{{ feedback.nomeCriador }}
                                        </span>
                                        <span class="text-gray-400 inline-flex items-center leading-none text-sm">
                                            {{ feedback.emailCriador}}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </section>
</div>
