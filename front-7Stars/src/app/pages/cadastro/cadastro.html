<div>
  <div class="m-8">
    <form (ngSubmit)="cadastrarFeedback()" action="#"
      class="mx-auto max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6">
      <div>
        <label for="nome" class="text-black dark:text-white">
          <span class="text-sm font-semibold">Seu Nome </span>

          <input type="text" id="Nome" name="nomeCriador" [(ngModel)]="feedback.nomeCriador"
            class="mt-0.5 w-full border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-yellow-600" />
        </label>
      </div>

      <div>
        <label for="Email" class="text-black dark:text-white">
          <span class="text-sm font-semibold">Seu Email </span>

          <input type="email" id="Email" name="emailCriador" [(ngModel)]="feedback.emailCriador"
            class="mt-0.5 w-full border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-yellow-600" />
        </label>
      </div>

      <div>
        <label for="NomeAvaliado" class="text-black dark:text-white">
          <span class="text-sm font-semibold"> Nome do Avaliado </span>

          <input type="text" id="NomeAvaliado" name="nomeAvaliado" [(ngModel)]="feedback.nomeAvaliado"
            class="mt-0.5 w-full border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-yellow-600" />
        </label>
      </div>

      <div>
        <label for="Instagram" class="text-black dark:text-white">
          <span class="text-sm font-semibold"> Instagram do Avaliado</span>

          <input type="text" id="Instagram" name="instagramAvaliado" [(ngModel)]="feedback.instagramAvaliado"
            class="mt-0.5 w-full border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm dark:border-white dark:bg-gray-900 dark:shadow-white dark:focus:ring-yellow-600" />
        </label>
      </div>

      <div>
        <label for="Headline" class="text-black">
          <span class="text-sm font-semibold"> Categoria </span>

          <select name="categoria" id="categoria" [(ngModel)]="feedback.categoria"
            class="mt-0.5 w-full border-2 border-black bg-white placeholder-black shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm">
            <option value="">Selecione uma opção</option>
            <option value="Empresa">Empresa</option>
            <option value="Lugar">Lugar</option>
            <option value="Pessoa">Pessoa</option>
            <option value="Produto">Produto</option>
            <option value="Serviço">Serviço</option>
          </select>
        </label>
      </div>
      <div>
        <span class="text-sm font-semibold"> Nota </span>

        <div class="flex items-center space-x-1 mt-2">
          <span *ngFor="let star of stars" (click)="selecionarNota(star)" class="cursor-pointer text-3xl"
            [ngClass]="star <= feedback.nota ? 'text-yellow-500' : 'text-gray-300'">
            ★
          </span>
        </div>

        <p class="text-sm text-gray-500 mt-1">
          Nota selecionada: {{ feedback.nota }}
        </p>
      </div>
      <div>
        <label for="mensagem" class="text-black">
          <span class="text-sm font-semibold"> Mensagem </span>

          <textarea id="mensagem" name="comentario" [(ngModel)]="feedback.comentario"
            class="mt-0.5 w-full resize-none border-2 border-black bg-white shadow-[4px_4px_0_0] shadow-black focus:ring-2 focus:ring-yellow-300 sm:text-sm"
            rows="4"></textarea>
        </label>
      </div>


      <button
        class="block w-full rounded-lg border border-black-600 bg-black px-12 py-3 text-sm font-medium text-white transition-colors hover:bg-transparent hover:text-indigo-600"
        type="submit">
        Send Message
      </button>
    </form>
  </div>

</div>
